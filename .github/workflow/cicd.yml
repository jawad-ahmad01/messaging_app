name: ChatApp CI/CD Pipeline

on:
  workflow_run:
    workflows: ["ChatApp DevSecOps Pipeline"]
    types:
      - completed

env:
  BACKEND_IMAGE: jawadahmad68/chatapp-backend
  FRONTEND_IMAGE: jawadahmad68/chatapp-frontend

jobs:

  # ✅ JOB 1 — TEST
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    # Only runs if DevSecOps passed!
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test --if-present

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm test --if-present

  # 🐳 JOB 2 — BUILD & PUSH
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            jawadahmad68/chatapp-backend:latest
            jawadahmad68/chatapp-backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            jawadahmad68/chatapp-frontend:latest
            jawadahmad68/chatapp-frontend:${{ github.sha }}

  # ☸️ JOB 3 — DEPLOY
  deploy:
    name: ☸️ Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Minikube
        uses: medyagh/setup-minikube@latest
        with:
          minikube-version: latest
          kubernetes-version: v1.34.0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/secret.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/mongo/pv.yml
          kubectl apply -f k8s/mongo/pvc.yml
          kubectl apply -f k8s/mongo/deployment.yml
          kubectl apply -f k8s/mongo/service.yml
          kubectl apply -f k8s/mongo-express/deployment.yml
          kubectl apply -f k8s/mongo-express/service.yml
          kubectl apply -f k8s/backend/deployment.yml
          kubectl apply -f k8s/backend/service.yml
          kubectl apply -f k8s/backend/hpa.yml
          kubectl apply -f k8s/backend/vpa.yml
          kubectl apply -f k8s/frontend/deployment.yml
          kubectl apply -f k8s/frontend/service.yml
          kubectl apply -f k8s/frontend/hpa.yml
          kubectl apply -f k8s/ingress.yml

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/backend -n chatapp
          kubectl rollout status deployment/frontend -n chatapp
          kubectl get pods -n chatapp
